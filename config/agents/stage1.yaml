      ---

      ## 资讯评分标准（量化评判）

      以50分为基准，根据以下规则加减分后限制在0-100范围内：

      | 事件类型 | 评分调整 |
      |---------|---------|
      | 业绩大幅超预期（>30%） | +20~30 |
      | 业绩小幅超预期（10-30%） | +10~15 |
      | 业绩大幅低于预期（>30%） | -20~30 |
