  # 【市场规则】A股交易规则

  > 智能体必须严格遵循本文件中的市场规则，不得使用训练知识中与本文件冲突的内容。

  ---

  ## 一、基础交易制度

  ### 1.1 结算制度

  | 制度项 | 规则 | 对分析的影响 |
  |-------|------|------------|
  | **T+1 结算** | 当日买入，次日方可卖出 | 买入后次日前无法止损；评估隔夜风险是必要流程 |
  | **T+0 例外** | 当日买入的股票，当日可以再次买入，但不能卖出 | 可加仓，不可减仓 |
  | **涨停板限制** | 买入委托可能无法成交（封单过大时） | 追板风险：成交后若次日开板，承受一日额外风险 |

  ### 1.2 涨跌停规则

  | 板块 | 涨停幅度 | 跌停幅度 | 特殊说明 |
  |-----|---------|---------|---------|
  | **主板（沪深）** | +10% | -10% | ST股票涨跌停幅度为±5% |
  | **科创板** | +20% | -20% | 新股上市前5日无涨跌停限制 |
  | **创业板** | +20% | -20% | 新股上市前5日无涨跌停限制 |
  | **北交所** | +30% | -30% | 新股上市首日±30% |

  **关键含义**：
  - 涨停时，止损委托可能无法成交（流动性陷阱）
  - 跌停时，无法出场，需等待开板（强制持有风险）
  - 连续涨停后持仓，若开板卖出，实际成交价可能大幅低于涨停价

  ### 1.3 集合竞价规则

  | 时段 | 时间 | 交易规则 |
  |-----|------|---------|
  | 早盘集合竞价 | 09:15-09:25 | 可撤单 |
  | 集合竞价锁定期 | 09:25-09:30 | 不可撤单 |
  | 连续竞价 | 09:30-11:30 / 13:00-14:57 | 正常竞价交易 |
  | 尾盘集合竞价 | 14:57-15:00 | 不可撤单，影响收盘价 |
  | 盘后固定价格交易 | 15:05-15:30 | 按收盘价成交，不影响当日行情 |

  **对交易计划的影响**：
  - 建议入场时段：09:30-09:45 情绪稳定后；或 14:00-14:30 机构建仓窗口
  - 避开时段：14:57-15:00（尾盘委托无法撤销）

  ---

  ## 二、A股特有风险清单

  ### 2.1 T+1 隔夜风险

  **触发场景**：今日买入，发现判断错误，但明日才能卖出。

  **风险等级判定**：

  | 风险等级 | 触发条件 |
  |---------|---------|
  | 低 | 次日无重大事件，历史最大隔夜低开 < 3% |
  | 中 | 次日有一般性信息披露，或历史隔夜低开 3-5% |
  | 高 | 3日内有业绩公告，或处于业绩窗口期（季末后45天内） |
  | 极高 | 今晚有重大公告（重组、问询、立案调查等） |

  ### 2.2 涨停流动性风险

  **买入风险（追板场景）**：
  - 封单厚度 < 流通市值0.5%：开板概率高，不建议追板
  - 封单厚度 0.5%-1%：有一定支撑，需评估板块情绪
  - 封单厚度 > 1%：封单较强，但仍需关注次日竞价走势

  **卖出风险（持有遇跌停场景）**：
  - 跌停板等待开板为唯一出场方式
  - 开板后流动性恢复，但往往出现大量抛盘，成交价可能持续下跌
  - 连续跌停时，本金归零风险真实存在，不应低估

  ### 2.3 停牌风险

  | 停牌类型 | 典型恢复时间 | 对持仓的影响 |
  |---------|-----------|-----------|
  | 重大事项停牌（重组/并购） | 1-6个月不等 | 持仓期间不可交易，风险极高 |
  | 股价异常波动停牌 | 1-3天 | 短期，可等待复牌 |
  | 临时停牌 | 当日内 | 影响较小 |

  **复牌风险**：长期停牌后复牌，往往出现较大幅度补跌，需重新评估持有意义。

  ### 2.4 融资融券杠杆风险

  **融资（做多杠杆）风险判断标准**：

  | 指标 | 预警线 | 危险线 |
  |-----|-------|-------|
  | 融资余额/流通市值 | 10% | 15% |
  | 融资余额5日降幅 | 15% | 25% |

  - 融资余额占流通市值比 > 15%：高危，存在踩踏风险
  - 5日融资余额降幅 > 20%：去杠杆踩踏进行中，强烈看空信号

  ---

  ## 三、沪深港通与北向资金

  ### 3.1 制度说明

  沪深港通（Stock Connect）允许香港投资者通过港交所交易A股（北向），也允许内地投资者通过沪深交易所交易港股（南向）。

  **对A股分析的影响**：
  - 北向资金（外资通过港股通买入A股）被视为长期价值资金的风向标
  - 北向持续净买入，通常被视为中线看多信号
  - 北向资金日交易额有上限（每日额度），额度使用比例本身也是市场情绪指标

  ### 3.2 分析中的使用规范

  - 北向资金净流入数据（`northbound_flow`）反映的是**当日**陆股通净买入，单位万元
  - 北向资金是情绪和资金面的参考指标，而非决定性因素
  - 短期内北向资金受汇率波动、全球风险偏好影响，不能单独作为买卖依据

  ---

  ## 四、A股市场特殊事件日历

  ### 4.1 定期信息披露窗口（高隔夜风险期）

  | 披露时间 | 内容 | 风险程度 |
  |---------|------|---------|
  | 1月下旬-4月底 | 年报披露期 | 高（业绩超预期/低于预期波动大） |
  | 4月下旬 | 一季报 | 中 |
  | 8月 | 半年报 | 高 |
  | 10月下旬 | 三季报 | 中 |
  | 季末最后一个交易日 | 机构调仓窗口 | 中（流动性变化） |

  ### 4.2 A股市场情绪特征

  - **节前效应**：节假日前最后1-2交易日，市场倾向于获利了结，做多需谨慎
  - **节后效应**：节假日后首个交易日，若假期有重大利好/利空，开盘往往跳空
  - **两会/重大政策会议**：政策预期驱动板块轮动，非个股基本面驱动
  - **月末/季末**：机构有调仓和排名压力，可能出现非理性买卖

hk: |
  # 【市场规则】港股交易规则

  > 智能体必须严格遵循本文件中的市场规则，不得使用训练知识中与本文件冲突的内容。

  ---

  ## 一、基础交易制度

  ### 1.1 结算制度

  | 制度项 | 规则 | 对分析的影响 |
  |-------|------|------------|
  | **T+2 结算** | 买入2个交易日后资金和股票才正式交割 | 理论上可当日卖出（T+0交易），但资金清算需2天 |
  | **T+0 交易** | 同一账户同一股票，当日可买入后立即卖出（不同于A股T+1） | 可当日止损，消除A股的"次日被迫持有"风险 |
  | **无涨跌停** | 港股无涨跌停限制，理论上可在一天内跌至零 | 风险敞口无上限；止损委托应立即触发，无A股封板困境 |

  **与A股的关键区别**：港股 T+0 交易意味着分析报告无需特别考量"今日买入无法今日出场"的情形；但无涨跌停限制意味着极端行情下单日亏损可能超过 20%，VaR 评估需更保守。

  ### 1.2 无涨跌停机制的影响

  **正面**：
  - 价格可以更快反映信息，减少信息滞后
  - 止损可以即时执行，不存在封板困境
  - 做空可以充分发挥价格发现功能

  **负面**：
  - 极端利空下，单日跌幅可能超过 50%（如财务造假曝光）
  - 庄股风险：操控者可快速拉升后快速出货，散户无保护机制
  - 流动性枯竭时，买卖差价（Spread）可能极大，止损成交价大幅偏离

  ### 1.3 港股做空机制

  港股存在较完善的做空机制，这与A股有根本区别：

  | 做空方式 | 说明 | 对个股分析的影响 |
  |---------|------|---------------|
  | **卖空（Short Selling）** | 机构可直接借券卖出，散户需通过券商 | 做空压力真实存在，不可忽视 |
  | **股票期权** | 港股有成熟期权市场，包含认购/认沽 | 期权持仓可反映机构方向预判 |
  | **沽空报告** | 知名做空机构（Muddy Waters等）公开沽空报告 | 一旦发布，股价可在数小时内暴跌30%+ |

  **分析含义**：港股研究必须关注沽空比例；高沽空比例个股风险评分应显著提高。

  ### 1.4 手数限制（Lot Size）

  港股每只股票最小交易单位（手数）不同，可能影响实际仓位执行：
  - 蓝筹股（如腾讯）：通常 100 股/手
  - 中小型股：可能 1000-10000 股/手
  - **对策**：实际仓位可能因手数限制而略有偏差，交易计划中应说明

  ---

  ## 二、港股特有风险清单

  ### 2.1 汇率风险（港元/人民币）

  港股以港元计价，内地投资者持有港股面临汇率风险：

  | 汇率情形 | 对持仓影响（以人民币计） |
  |---------|----------------------|
  | 港元升值 | 人民币回报高于港元回报，正面 |
  | 港元贬值 | 人民币回报低于港元回报，负面 |
  | 港元与美元挂钩（联系汇率制度） | 美元强弱间接影响港元，但波动范围有限（7.75-7.85区间） |

  **分析要求**：持有期超过1个月的中线/长线交易，需在风险提示中说明汇率风险。短线（< 5交易日）：汇率影响通常可忽略。

  ### 2.2 流动性分层风险

  港股市场流动性分化极为严重：

  | 市值分层 | 流动性风险 |
  |---------|----------|
  | 超大盘（> 500亿港元市值） | 低 |
  | 大盘（100-500亿） | 中低 |
  | 中盘（10-100亿） | 中等 |
  | 小盘（< 10亿） | 高，持仓需谨慎 |
  | 仙股（< 1亿港元市值） | 极高，不建议参与 |

  **建议**：流动性低的股票，买入容易、卖出困难；止损计划中需考虑大额卖单的市场冲击。

  ### 2.3 停盘风险

  港股无A股的行政停牌机制，但以下情形仍可能导致交易中断：
  - 公司申请短暂停牌等待公告发布（通常数小时至1天）
  - 极端波动触发交易所主动暂停（罕见）
  - 公司除牌（最终结果是股票清零，投资者损失全部本金）

  **除牌风险**：港股对长期亏损、不达标公司会除牌，与A股的"壳价值"保护完全不同。持有濒临除牌标准公司的风险等级应标注为"极高"。

  ### 2.4 庄股风险

  港股中小型股庄股操控更为普遍，特征包括：
  - 股价长期横盘后突然拉升，无基本面支撑
  - 换手率异常，但成交多为对敲
  - 沽空比例极低（庄家持有大量股票，难以借券）
  - 突然暴跌并无法恢复

  **识别标志**：股东集中度极高（前10大股东持股 > 80%）+ 无实质业务的"壳公司" → 直接回避。

  ---

  ## 三、港股市场特殊事件日历

  ### 3.1 影响港股的主要宏观事件

  | 事件类型 | 影响机制 | 风险等级 |
  |---------|---------|---------|
  | **美联储议息会议** | 港元联系汇率制，港股资金成本直接受美联储影响 | 高 |
  | **中国内地重大政策** | 大量港股业务在内地，政策影响直接 | 高 |
  | **人民币汇率大幅波动** | 影响内地赴港资金量，也影响港股估值 | 中高 |
  | **地缘政治（中美关系）** | 港股估值折价扩大/缩小 | 中高 |
  | **香港本地政治/社会事件** | 影响市场情绪和外资配置意愿 | 中 |

  ### 3.2 港股财报披露规律

  - 中期业绩（半年报）：通常 8月发布
  - 年报：通常次年3-4月发布
  - **与A股区别**：港股无强制季报，信息披露频率低于A股，导致业绩期波动更集中

  ### 3.3 港股交易时间（香港时间，UTC+8）

  | 时段 | 时间 | 说明 |
  |-----|------|------|
  | 竞价时段 | 09:00-09:20 | 开盘前竞价 |
  | 持续交易（上午） | 09:30-12:00 | 正常交易 |
  | 持续交易（下午） | 13:00-16:00 | 正常交易 |
  | 收市竞价 | 16:00-16:10 | 收盘竞价，可撤单 |
  | 延长收市竞价 | 16:10-16:12 | 不可撤单 |

us: |
  # 【市场规则】美股交易规则

  > 智能体必须严格遵循本文件中的市场规则，不得使用训练知识中与本文件冲突的内容。

  ---

  ## 一、基础交易制度

  ### 1.1 结算制度

  | 制度项 | 规则 | 对分析的影响 |
  |-------|------|------------|
  | **T+1 结算** | 2024年5月起美股正式迁移至T+1结算 | 资金结算周期缩短，流动性改善 |
  | **T+0 交易** | 同一账户可当日买卖同一股票，但受 PDT 规则限制 | 理论上可当日止损，实际受 PDT 限制 |
  | **无涨跌停** | 美股无涨跌停限制（但有熔断机制） | 极端情形下单日跌幅无上限，VaR 保守评估 |

  ### 1.2 PDT 规则（Pattern Day Trader，频繁日内交易者规则）

  这是美股最重要的制度约束之一，与A股/港股有根本区别：

  | 规则项 | 内容 |
  |-------|------|
  | **触发条件** | 保证金账户中，5个交易日内日内交易（当日开仓当日平仓）达到4次或以上 |
  | **触发后限制** | 账户净值须维持 25,000 美元以上，否则只能进行平仓操作 |
  | **适用账户** | 保证金账户（Margin Account）；现金账户不受 PDT 限制，但资金需等待结算 |
  | **应对方式** | 账户净值 > 25,000 美元可无限日内交易；或使用现金账户；或持仓过夜 |

  **分析含义**：账户净值较小的投资者，交易计划应优先考虑持仓隔夜，减少日内交易次数；止损时需考虑 PDT 限制是否允许当日再入场。

  ### 1.3 熔断机制

  | 触发条件 | 影响 |
  |---------|------|
  | 标普500单日下跌7%（Level 1） | 全市场暂停交易15分钟 |
  | 标普500单日下跌13%（Level 2） | 全市场暂停交易15分钟 |
  | 标普500单日下跌20%（Level 3） | 当日剩余时间停止交易 |

  **个股层面**：个股也有独立的熔断机制（LULD），防止个股在5分钟内过度波动，但不等同于涨跌停。

  ### 1.4 盘前盘后交易（Extended Hours）

  | 时段 | 时间（美东时间） | 特点 |
  |-----|--------------|------|
  | 盘前交易 | 04:00-09:30 | 流动性低，价差大，重要新闻在此时段反应 |
  | 正常交易 | 09:30-16:00 | 主要交易时段 |
  | 盘后交易 | 16:00-20:00 | 流动性低，财报通常在盘后发布，波动剧烈 |

  **关键点**：美股财报通常在盘后（After Market）或盘前（Pre Market）发布，导致次日开盘大幅跳空。财报日前后的隔夜风险极高。

  ---

  ## 二、美股特有风险清单

  ### 2.1 财报日历风险（Earnings Calendar Risk）

  美股最重要的特有风险之一。

  | 阶段 | 风险特征 |
  |-----|---------|
  | **财报发布前** | 期权隐含波动率大幅上升，预期拉满 |
  | **财报发布后** | 若不及预期，股价可单日下跌10-30%；若超预期可上涨10-20% |
  | **财报季** | 每季末后6周为财报密集期，市场整体波动上升 |

  **财报季时间表**：
  - Q1 财报：通常4月中旬至5月初
  - Q2 财报：通常7月中旬至8月初
  - Q3 财报：通常10月中旬至11月初
  - Q4（全年）财报：通常次年1月至2月

  **分析规则**：
  - 财报发布日及前1日：持仓风险等级强制升为"高"，建议降低仓位
  - **禁止在财报日前建立大仓位**，除非报告明确说明财报预期且做了情景分析

  ### 2.2 汇率风险（美元计价）

  | 场景 | 人民币计算影响 |
  |-----|------------|
  | 美元升值 | 美股人民币回报优于美元回报，正面 |
  | 美元贬值 | 美股人民币回报低于美元回报，负面 |
  | 美联储加息 | 通常推升美元，同时对股市有压制效应 |
  | 美联储降息 | 通常推升股市（流动性改善），美元或走弱 |

  **分析要求**：中线（1个月以上）持仓必须在风险提示中说明汇率敞口。

  ### 2.3 利率风险

  美股与无风险利率（10年期美债收益率）高度相关：
  - **利率上升**：折现率上升，成长股（高PE）估值承压最大；价值股相对抗跌
  - **利率下降**：成长股受益，科技股往往大涨
  - **信用利差扩大**：经济衰退预期，高收益债压力传导至成长股

  **分析要点**：美股分析不能仅看技术面，需结合美联储政策周期和国债收益率走势。

  ### 2.4 做空机制与轧空风险

  美股做空机制完善，且机构参与度高：

  | 做空形式 | 说明 |
  |---------|------|
  | **借券卖空** | 机构借券卖空，是主流机制 |
  | **Put 期权** | 购买认沽期权，下跌受益 |
  | **做空报告** | 专业做空机构发布做空报告，可引发股价暴跌 |
  | **轧空（Short Squeeze）** | 高沽空比例个股若股价上涨，空头被迫买入平仓，形成正反馈暴涨 |

